<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langgan Jaya Abadi | Industrial Construction & Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">

    <style>
        .section-placeholder {
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #1e293b;
        }
    </style>
</head>
<body class="bg-slate-950 font-sans text-slate-200 selection:bg-blue-500/30">

    <!-- Global Navigation -->
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 py-6">
      <div class="container mx-auto px-6 flex justify-between items-center">
        <div class="flex items-center gap-3 group cursor-pointer">
          <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-6 transition-transform">
            <span class="text-white font-display font-black text-2xl">L</span>
          </div>
          <div>
            <h1 class="font-display font-black text-xl tracking-tighter leading-none text-white">LANGGAN JAYA ABADI</h1>
            <p class="text-[10px] tracking-[0.2em] text-blue-400 font-bold uppercase mt-1">Engineering & Construction</p>
          </div>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden lg:flex items-center gap-8">
          <div class="flex items-center gap-1">
            <a href="#home" class="nav-link px-4 py-2 text-sm font-bold tracking-wide text-white" data-id="BERANDA" data-en="HOME">BERANDA</a>
            <a href="#about" class="nav-link px-4 py-2 text-sm font-bold tracking-wide text-slate-400 hover:text-white" data-id="TENTANG" data-en="ABOUT">TENTANG</a>
            <a href="#services" class="nav-link px-4 py-2 text-sm font-bold tracking-wide text-slate-400 hover:text-white" data-id="LAYANAN" data-en="SERVICES">LAYANAN</a>
            <a href="#portfolio" class="nav-link px-4 py-2 text-sm font-bold tracking-wide text-slate-400 hover:text-white" data-id="PORTOFOLIO" data-en="PORTFOLIO">PORTOFOLIO</a>
          </div>

          <div class="h-6 w-px bg-white/10 mx-2"></div>

          <div class="flex bg-slate-900/50 p-1 rounded-lg border border-white/5">
            <button id="btn-id" onclick="setLang('id')" class="px-3 py-1.5 rounded-md text-[10px] font-bold transition-all active bg-blue-600 text-white">ID</button>
            <button id="btn-en" onclick="setLang('en')" class="px-3 py-1.5 rounded-md text-[10px] font-bold transition-all text-slate-400">EN</button>
          </div>

          <a href="#contact" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-900/20 flex items-center gap-2">
            <span data-id="Konsultasi Gratis" data-en="Free Consultation">Konsultasi Gratis</span>
            <span class="text-lg">→</span>
          </a>
        </div>

        <!-- Mobile Toggle -->
        <button class="lg:hidden text-white" onclick="toggleMenu()">
          <svg id="menu-icon" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 z-40 bg-slate-950 translate-x-full transition-transform duration-500 lg:hidden flex flex-col justify-center items-center gap-8">
      <a href="#home" onclick="toggleMenu()" class="text-3xl font-display font-bold" data-id="BERANDA" data-en="HOME">BERANDA</a>
      <a href="#about" onclick="toggleMenu()" class="text-3xl font-display font-bold" data-id="TENTANG" data-en="ABOUT">TENTANG</a>
      <a href="#services" onclick="toggleMenu()" class="text-3xl font-display font-bold" data-id="LAYANAN" data-en="SERVICES">LAYANAN</a>
      <a href="#portfolio" onclick="toggleMenu()" class="text-3xl font-display font-bold" data-id="PORTOFOLIO" data-en="PORTFOLIO">PORTOFOLIO</a>
      <a href="#contact" onclick="toggleMenu()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold mt-4" data-id="Konsultasi Gratis" data-en="Free Consultation">Konsultasi Gratis</a>

      <div class="flex gap-4 mt-8">
        <button id="btn-id-m" onclick="setLang('id')" class="w-12 h-12 rounded-xl border border-white/10 font-bold active bg-blue-600">ID</button>
        <button id="btn-en-m" onclick="setLang('en')" class="w-12 h-12 rounded-xl border border-white/10 font-bold text-slate-400">EN</button>
      </div>
    </div>

    <!-- Page Sections Placeholders -->
    <div id="home-placeholder" class="section-placeholder"></div>
    <div id="services-placeholder" class="section-placeholder"></div>
    <div id="about-placeholder" class="section-placeholder"></div>
    <div id="portfolio-placeholder" class="section-placeholder"></div>
    <div id="faq-placeholder" class="section-placeholder"></div>
    <div id="contact-placeholder" class="section-placeholder"></div>
    <div id="footer-placeholder" class="section-placeholder"></div>

    <!-- Scripts -->
    <script src="assets/js/component-loader.js"></script>
    <script src="assets/js/navbar.js" defer></script>
    <script src="assets/js/language.js" defer></script>
    <script src="assets/js/services.js" defer></script>
    <script src="assets/js/faq.js" defer></script>
    <script src="assets/js/main.js" defer></script>

    <script>
      // Re-initialize scripts after components are loaded
      window.addEventListener('componentsLoaded', () => {
        console.log('All components loaded, initializing scripts...');

        // Trigger initial language set
        if (window.setLang) {
          window.setLang(window.currentLang || 'id');
        }

        // Re-run any initialization needed from main.js
        if (window.initMain) {
          window.initMain();
        }
        if (window.initFAQ) {
          window.initFAQ();
        }
      });
    </script>
</body>
</html>
